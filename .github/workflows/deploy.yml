name: Deploy

# Déploie src/ vers le serveur (canada) via rsync/SSH, à travers le tailnet.
# OPTIONNEL : ne fait rien tant que les secrets ne sont pas configurés (warning).
# Alternative plus simple : déployer depuis ta machine avec `npm run deploy`.
#
# Secrets à définir (GitHub > Settings > Secrets and variables > Actions) :
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY (clé privée),
#   TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET (Tailscale OAuth, pour rejoindre le tailnet).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier la présence des secrets
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets de déploiement absents — étape ignorée (déploie via 'npm run deploy' ou configure les secrets)."
          fi

      - name: Connexion au tailnet (Tailscale)
        if: steps.check.outputs.ready == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Déploiement rsync
        if: steps.check.outputs.ready == 'true'
        run: |
          install -m 600 /dev/null key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > key
          rsync -az --delete \
            --exclude ".DS_Store" --exclude "Thumbs.db" \
            -e "ssh -i key -o StrictHostKeyChecking=accept-new" \
            src/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"
          rm -f key
