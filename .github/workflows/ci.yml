name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # npm install (et non npm ci) : sharp a des binaires optionnels par
        # plateforme, et un lockfile généré sous Windows fait échouer `npm ci`
        # sur la CI Linux. npm install résout correctement selon la plateforme.
        run: npm install --no-audit --no-fund

      - name: Lint (prettier + eslint + stylelint + html-validate)
        run: npm run lint

      - name: Tests
        run: npm test
